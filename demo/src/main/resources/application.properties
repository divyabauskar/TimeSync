spring.application.name=demo

# ===============================
# DATABASE CONFIGURATION
# ===============================
# Added allowPublicKeyRetrieval=true to fix the connection error
spring.datasource.url=jdbc:mysql://localhost:3306/divya?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# DIALECT (Removed spring.jpa.database-platform)
# Spring Boot 3+ automatically detects the correct MySQL dialect.
# Keeping it manual often causes the "HHH90000025" warning.
# ===============================

# ===============================
# SERVER
# ===============================
server.port=8083