<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TimeZone Buddies - Connect Globally</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

    <style>
        :root {
            --accent-color: #38bdf8; /* Electric Blue */
            --text-color: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.8); /* Deep Obsidian with opacity */
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Full-screen Background with professional faded image */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Glassmorphism Box */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 40px;
            border-radius: 8px; /* Sharp professional edges */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
        }

        .tagline {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Buttons Styling */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-login {
            background: var(--accent-color);
            color: #0f172a;
            border: 1px solid var(--accent-color);
        }

        .btn-login:hover {
            background: transparent;
            color: var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .btn-signup {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-signup:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="login-card">
    <div class="logo">TimeZone <span>Buddies</span></div>
    <div class="tagline">Connect Across the World</div>

    <div class="button-group">
        <a href="login.html" class="btn btn-login">Login</a>
        <a href="signup.html" class="btn btn-signup">Sign Up</a>
    </div>
</div>

</body>
</html>
