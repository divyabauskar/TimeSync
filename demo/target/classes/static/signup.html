<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - TimeSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        :root {
            --accent: #38bdf8;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: #0f172a;
        }

        /* Professional Background */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.8)),
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Glass Square Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 450px;
            padding: 50px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            text-align: center;
            color: #fff;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1.5px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Modern Form Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .full-width { grid-column: span 2; }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        input:focus, select:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        select option {
            background: #1e293b;
            color: #fff;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 16px;
            margin-top: 25px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .link {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="bg-overlay"></div>

<div class="card">
    <h2>Join TimeSync</h2>
    <p class="subtitle">Global coordination starts here.</p>

    <form id="signupForm" class="form-grid">
        <input type="text" id="fullName" class="full-width" placeholder="Full Name" required>
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" class="full-width" placeholder="Create Password" required>

        <select id="country" required>
            <option value="" disabled selected>Select Country</option>
        </select>

        <select id="timezone" required>
            <option value="" disabled selected>Timezone</option>
        </select>

        <button type="submit" class="full-width">Create Account</button>
    </form>

    <div class="link">
        Already a buddy? <a href="login.html">Sign In</a>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8083';

    // Same Countries and Timezones arrays as before...
    const countries =[
        "Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria",
        "Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia",
        "Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia",
        "Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica",
        "Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt",
        "El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon",
        "Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guyana","Haiti","Honduras","Hungary",
        "Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan",
        "Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein",
        "Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania",
        "Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar",
        "Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia",
        "Norway","Oman","Pakistan","Palau","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal",
        "Qatar","Romania","Russia","Rwanda","Saint Lucia","Samoa","San Marino","Saudi Arabia","Senegal","Serbia","Seychelles",
        "Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","Spain",
        "Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Togo",
        "Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates",
        "United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen",
        "Zambia","Zimbabwe"
    ];
    // (Ensure you include your full list here)

    const timezones = [
        "Africa/Cairo", "Africa/Johannesburg", "Africa/Lagos", "Africa/Nairobi",
        "America/Anchorage", "America/Argentina/Buenos_Aires", "America/Chicago",
        "America/Denver", "America/Los_Angeles", "America/Mexico_City",
        "America/New_York", "America/Phoenix", "America/Sao_Paulo",
        "Asia/Bangkok", "Asia/Dubai", "Asia/Hong_Kong", "Asia/Istanbul",
        "Asia/Jakarta", "Asia/Jerusalem", "Asia/Kolkata", "Asia/Manila",
        "Asia/Qatar", "Asia/Riyadh", "Asia/Seoul", "Asia/Shanghai",
        "Asia/Singapore", "Asia/Tokyo",
        "Australia/Adelaide", "Australia/Brisbane", "Australia/Melbourne", "Australia/Perth", "Australia/Sydney",
        "Europe/Amsterdam", "Europe/Berlin", "Europe/London", "Europe/Madrid", "Europe/Moscow", "Europe/Paris", "Europe/Rome",
        "Pacific/Auckland", "Pacific/Fiji", "Pacific/Honolulu"
    ];

    function notify(message, type = "success") {
        Toastify({
            text: message,
            duration: 3000,
            gravity: "top",
            position: "right",
            style: {
                background: type === "success" ? "#22c55e" : "#ef4444",
                borderRadius: "8px",
                fontWeight: "600"
            }
        }).showToast();
    }

    // Populate Selects
    const countrySelect = document.getElementById('country');
    countries.sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        countrySelect.appendChild(opt);
    });

    const timezoneSelect = document.getElementById('timezone');
    timezones.sort().forEach(tz => {
        const opt = document.createElement('option');
        opt.value = tz;
        opt.textContent = tz.replace(/_/g, ' ');
        timezoneSelect.appendChild(opt);
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            fullName: document.getElementById('fullName').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            country: document.getElementById('country').value,
            timezone: document.getElementById('timezone').value
        };

        try {
            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                notify('Account created! Redirecting...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                const errorText = await res.text();
                notify(errorText || 'Signup failed', 'error');
            }
        } catch {
            notify('Cannot connect to server', 'error');
        }
    });
</script>

</body>
</html>
